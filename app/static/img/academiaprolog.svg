<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="320" height="80" viewBox="0 0 320 80" role="img" aria-label="AcademiaPro logo">
  <defs>
    <linearGradient id="g1" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#1F6BFF"/>
      <stop offset="100%" stop-color="#0F3366"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" x2="1">
      <stop offset="0%" stop-color="#FFD166"/>
      <stop offset="100%" stop-color="#FF9F1C"/>
    </linearGradient>
  </defs>

  <!-- Book / open pages icon -->
  <g transform="translate(10,14)">
    <rect x="0" y="0" width="44" height="44" rx="10" ry="10" fill="url(#g1)" />
    <path d="M8 10 C18 2, 28 2, 36 10 L36 34 C28 30, 18 30, 8 34 Z" fill="#ffffff" opacity="0.12"/>
    <path d="M10 14 C18 10, 26 10, 34 14" fill="none" stroke="url(#g2)" stroke-width="3" stroke-linecap="round"/>
    <path d="M10 22 C18 18, 26 18, 34 22" fill="none" stroke="#fff" stroke-opacity="0.3" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(70,46)">
    <text x="0" y="0" font-family="Inter, Arial, Helvetica, sans-serif" font-size="28" font-weight="800" fill="#0F1724">Academia</text>
    <text x="130" y="0" font-family="Inter, Arial, Helvetica, sans-serif" font-size="28" font-weight="800" fill="url(#g1)">Pro</text>
    <text x="0" y="18" font-family="Inter, Arial, Helvetica, sans-serif" font-size="10" fill="#475569" letter-spacing="0.08em">Academic &amp; Technical</text>
  </g>
</svg>
