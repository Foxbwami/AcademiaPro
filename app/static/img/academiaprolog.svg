<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 120" role="img" aria-labelledby="title desc">
  <title id="title">AcademiaPro logo</title>
  <desc id="desc">Open book and quill icon with clear AcademiaPro text</desc>
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe27a"/>
      <stop offset="52%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#a66f10"/>
    </linearGradient>
    <linearGradient id="navy" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#123f8a"/>
      <stop offset="100%" stop-color="#061a3d"/>
    </linearGradient>
  </defs>

  <g transform="translate(10 16)">
    <path d="M12 62c18-8 34-8 50 3V25c-16-9-33-10-50-2v39z" fill="none" stroke="url(#gold)" stroke-width="7" stroke-linejoin="round"/>
    <path d="M102 62c-18-8-34-8-50 3V25c16-9 33-10 50-2v39z" fill="none" stroke="url(#gold)" stroke-width="7" stroke-linejoin="round"/>
    <path d="M12 70c18-7 34-6 50 5 16-11 32-12 50-5" fill="none" stroke="url(#gold)" stroke-width="7" stroke-linecap="round"/>
    <path d="M67 13c22-9 36-7 44 6-13 2-19 9-20 21-1 14-12 24-34 31 11-18 10-37 10-58z" fill="url(#navy)" stroke="url(#gold)" stroke-width="4" stroke-linejoin="round"/>
    <path d="M83 18C72 35 65 50 58 72" fill="none" stroke="url(#gold)" stroke-width="4" stroke-linecap="round"/>
  </g>

  <g transform="translate(140 30)">
    <text x="0" y="34" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="900" letter-spacing="-1.5" fill="#081a3a">Academia</text>
    <text x="180" y="34" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="900" letter-spacing="-1.5" fill="url(#gold)">Pro</text>
    <line x1="2" y1="51" x2="208" y2="51" stroke="url(#gold)" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
    <text x="4" y="74" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="3" fill="#123f8a">ACADEMIC &amp; TECHNICAL SUPPORT</text>
