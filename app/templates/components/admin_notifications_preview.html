<div class="notifications-preview">
  <ul class="list-unstyled mb-0">
    {% for note in (notifications or [])[:6] %}
      <li class="d-flex align-items-start gap-2 py-2 border-bottom">
        <div class="me-2"><i class="bi bi-info-circle-fill text-primary"></i></div>
        <div class="flex-fill small">{{ note.text }}</div>
        <div class="small text-muted">{{ note.time or '' }}</div>
      </li>
    {% else %}
      <li class="small text-muted">No notifications</li>
    {% endfor %}
  </ul>
</div>
