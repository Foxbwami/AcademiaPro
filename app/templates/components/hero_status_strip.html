<section class="hero-status-strip">
  <div class="container">
    <div class="hero-status-strip-inner">
      <div class="hero-status-copy">
        <div class="hero-status-strip-title">{{ panel.top }}</div>
        {% if panel.intro %}
          <p>{{ panel.intro }}</p>
        {% endif %}
      </div>
      <div class="hero-status-items">
        {% for item in panel.list %}
          <div class="hero-status-item">
            <span class="hero-status-icon" aria-hidden="true"><i class="bi {{ item.icon }}"></i></span>
            <span>
              <strong>{{ item.title }}</strong>
              <small>{{ item.text }}</small>
            </span>
          </div>
        {% endfor %}
      </div>
    </div>
  </div>
</section>
